<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fatCoinCapital | Premium Wealth Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
        #sidebar.open { transform: translateX(0); }
        #overlay { transition: opacity 0.3s ease; pointer-events: none; opacity: 0; }
        #overlay.open { pointer-events: auto; opacity: 1; }
        
        .page-bg { background-color: #f1f5f9; } 
        
        .asset-slider-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 1.25rem;
            padding-bottom: 1.5rem;
            scrollbar-width: none;
        }
        .asset-slider-container::-webkit-scrollbar { display: none; }

        /* Matured Darkened White Style */
        .market-terminal { 
            flex: 0 0 92%; 
            scroll-snap-align: center; 
            border-radius: 2.5rem; 
            background: #f8fafc; 
            border: 1px solid #e2e8f0; 
            overflow: hidden; 
            min-height: 420px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05);
        }

        .hero-title-stack {
            font-size: 24px;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -0.05em;
            color: #0f172a;
            text-transform: uppercase;
            margin-bottom: 1.25rem;
        }

        .hero-body-stack {
            font-size: 11px;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            line-height: 1.6;
            margin-bottom: 2rem;
            max-width: 260px;
        }
    </style>
</head>
<body class="page-bg text-slate-900 overflow-x-hidden">

    <script src="https://widgets.coingecko.com/gecko-coin-ticker-widget.js"></script>
    <script src="https://widgets.coingecko.com/gecko-coin-converter-widget.js"></script>

    <div id="overlay" onclick="closeAll()" class="fixed inset-0 bg-slate-900/20 z-[60] backdrop-blur-sm"></div>

    <header class="sticky top-0 bg-white/95 backdrop-blur-md z-50 px-4 py-4 border-b border-slate-200">
        <nav class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[#2b59ff] rounded-full flex items-center justify-center text-white font-bold text-sm">f</div>
                <span class="text-xl font-bold tracking-tight text-slate-900 uppercase">fatCoinCapital</span>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="openModal('signup')" class="bg-[#2b59ff] text-white px-5 py-2.5 rounded-xl font-bold text-xs uppercase tracking-wider shadow-lg">Get Started</button>
                <button onclick="toggleMenu()" class="p-2.5 text-slate-800 bg-slate-100 rounded-xl border border-slate-200">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
            </div>
        </nav>
    </header>

    <main id="mainContent" class="max-w-6xl mx-auto px-4 pb-24">
        
        <!-- HERO SECTION -->
        <div class="pt-8 mb-10">
            <div class="asset-slider-container">
                <div class="market-terminal p-8" style="background: linear-gradient(rgba(248,250,252,0.9), rgba(248,250,252,0.9)), url('image_10.png'); background-size: cover;">
                    <div class="relative z-10">
                        <h3 class="hero-title-stack">UNLOCK YOUR<br>PRIVATE<br>WEALTH HUB</h3>
                        <p class="hero-body-stack">SECURELY ENTER YOUR DASHBOARD TO MONITOR GROWTH AND MANAGE YOUR ELITE ASSETS IN REAL-TIME.</p>
                        <div class="space-y-3">
                            <button onclick="openModal('signup')" class="w-full py-5 bg-[#2b59ff] text-white rounded-2xl font-black uppercase tracking-widest text-[10px]">Create Account</button>
                            <button onclick="openModal('login')" class="w-full py-5 bg-white border border-slate-200 text-slate-900 rounded-2xl font-black uppercase tracking-widest text-[10px]">Log In</button>
                        </div>
                    </div>
                </div>
                <!-- Additional Hub Cards (Rewards & Security) would follow here -->
            </div>
        </div>

        <!-- 4 ACTIVE ASSET CARDS -->
        <div class="space-y-4 mb-12">
            <h3 class="text-xs font-black uppercase tracking-[0.3em] text-slate-400 ml-4 mb-6">Market Terminals</h3>
            <div class="asset-slider-container">
                <!-- Bitcoin -->
                <div class="market-terminal p-6 md:p-10">
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-center">
                        <div class="lg:col-span-2"><gecko-coin-ticker-widget coin-id="bitcoin" initial-currency="usd" locale="en" dark-mode="false" transparent-background="true"></gecko-coin-ticker-widget></div>
                        <div class="lg:col-span-1 bg-white p-6 rounded-3xl border border-slate-200">
                            <button class="w-full py-4 bg-[#2b59ff] text-white rounded-2xl font-black uppercase text-[10px] tracking-widest mb-4">Trade BTC</button>
                            <gecko-coin-converter-widget coin-id="bitcoin" initial-currency="usd" locale="en" dark-mode="false" transparent-background="true"></gecko-coin-converter-widget>
                        </div>
                    </div>
                </div>
                <!-- Ethereum -->
                <div class="market-terminal p-6 md:p-10">
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-center">
                        <div class="lg:col-span-2"><gecko-coin-ticker-widget coin-id="ethereum" initial-currency="usd" locale="en" dark-mode="false" transparent-background="true"></gecko-coin-ticker-widget></div>
                        <div class="lg:col-span-1 bg-white p-6 rounded-3xl border border-slate-200">
                            <button class="w-full py-4 bg-[#2b59ff] text-white rounded-2xl font-black uppercase text-[10px] tracking-widest mb-4">Trade ETH</button>
                            <gecko-coin-converter-widget coin-id="ethereum" initial-currency="usd" locale="en" dark-mode="false" transparent-background="true"></gecko-coin-converter-widget>
                        </div>
                    </div>
                </div>
                <!-- Solana -->
                <div class="market-terminal p-6 md:p-10">
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-center">
                        <div class="lg:col-span-2"><gecko-coin-ticker-widget coin-id="solana" initial-currency="usd" locale="en" dark-mode="false" transparent-background="true"></gecko-coin-ticker-widget></div>
                        <div class="lg:col-span-1 bg-white p-6 rounded-3xl border border-slate-200">
                            <button class="w-full py-4 bg-[#2b59ff] text-white rounded-2xl font-black uppercase text-[10px] tracking-widest mb-4">Trade SOL</button>
                            <gecko-coin-converter-widget coin-id="solana" initial-currency="usd" locale="en" dark-mode="false" transparent-background="true"></gecko-coin-converter-widget>
                        </div>
                    </div>
                </div>
                <!-- Tether Gold -->
                <div class="market-terminal p-6 md:p-10">
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-center">
                        <div class="lg:col-span-2"><gecko-coin-ticker-widget coin-id="tether-gold" initial-currency="usd" locale="en" dark-mode="false" transparent-background="true"></gecko-coin-ticker-widget></div>
                        <div class="lg:col-span-1 bg-white p-6 rounded-3xl border border-slate-200">
                            <button class="w-full py-4 bg-[#2b59ff] text-white rounded-2xl font-black uppercase text-[10px] tracking-widest mb-4">Trade XAUT</button>
                            <gecko-coin-converter-widget coin-id="tether-gold" initial-currency="usd" locale="en" dark-mode="false" transparent-background="true"></gecko-coin-converter-widget>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('open'); }
        function closeAll() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }
    </script>
</body>
</html>
