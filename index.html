<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fatCoin Capital | Index Upgrade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        /* The Horizontal Slider Container */
        .asset-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 1.25rem;
            padding: 1rem;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none;  /* IE/Edge */
            -webkit-overflow-scrolling: touch;
        }

        .asset-slider::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }

        /* Glassmorphism Card Style */
        .crypto-card {
            flex: 0 0 85%; /* Shows part of the next card to signal swiping */
            scroll-snap-align: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            transition: transform 0.3s ease;
        }

        /* Neo-Brutalist Accent */
        .crypto-card:active {
            transform: scale(0.98);
            border: 1px solid #ffffff;
        }

        .price-up { color: #00ff88; }
        .price-down { color: #ff3366; }

        .btn-trade {
            background: #ffffff;
            color: #000000;
            font-weight: 800;
            text-transform: uppercase;
            padding: 0.75rem;
            border-radius: 12px;
            text-align: center;
            display: block;
            margin-top: 1.5rem;
            transition: all 0.2s ease;
        }
    </style>
</head>
<body>

    <header class="p-6">
        <h1 class="text-2xl font-black tracking-tighter uppercase">fatCoin<span class="text-gray-500">Capital</span></h1>
    </header>

    <!-- Side-Slide Asset Section -->
    <main class="asset-slider">
        
        <!-- Bitcoin Card -->
        <section class="crypto-card">
            <div class="flex justify-between items-start">
                <div>
                    <h2 class="text-sm uppercase tracking-widest text-gray-400">Bitcoin</h2>
                    <p class="text-3xl font-bold mt-1">BTC</p>
                </div>
                <div class="bg-orange-500/20 p-2 rounded-lg">
                    <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.svg?v=024" alt="BTC" class="w-8 h-8">
                </div>
            </div>
            <div class="mt-8">
                <p class="text-4xl font-mono">$64,230.50</p>
                <p class="price-up text-sm mt-1 font-bold">+2.45% (24h)</p>
            </div>
            <a href="#" class="btn-trade">Trade Now</a>
        </section>

        <!-- Ethereum Card -->
        <section class="crypto-card">
            <div class="flex justify-between items-start">
                <div>
                    <h2 class="text-sm uppercase tracking-widest text-gray-400">Ethereum</h2>
                    <p class="text-3xl font-bold mt-1">ETH</p>
                </div>
                <div class="bg-blue-500/20 p-2 rounded-lg">
                    <img src="https://cryptologos.cc/logos/ethereum-eth-logo.svg?v=024" alt="ETH" class="w-8 h-8">
                </div>
            </div>
            <div class="mt-8">
                <p class="text-4xl font-mono">$3,450.12</p>
                <p class="price-up text-sm mt-1 font-bold">+1.12% (24h)</p>
            </div>
            <a href="#" class="btn-trade">Trade Now</a>
        </section>

        <!-- Solana Card -->
        <section class="crypto-card">
            <div class="flex justify-between items-start">
                <div>
                    <h2 class="text-sm uppercase tracking-widest text-gray-400">Solana</h2>
                    <p class="text-3xl font-bold mt-1">SOL</p>
                </div>
                <div class="bg-purple-500/20 p-2 rounded-lg">
                    <img src="https://cryptologos.cc/logos/solana-sol-logo.svg?v=024" alt="SOL" class="w-8 h-8">
                </div>
            </div>
            <div class="mt-8">
                <p class="text-4xl font-mono">$145.88</p>
                <p class="price-down text-sm mt-1 font-bold">-0.85% (24h)</p>
            </div>
            <a href="#" class="btn-trade">Trade Now</a>
        </section>

    </main>

    <footer class="p-6 mt-10">
        <div class="border-t border-gray-800 pt-6">
            <p class="text-gray-600 text-xs text-center uppercase tracking-widest">© 2026 fatCoin Capital Terminal</p>
        </div>
    </footer>

</body>
</html>
